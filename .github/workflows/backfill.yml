name: Backfill History

on:
  workflow_dispatch:  # 수동 실행만

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Backfill history (7+ days)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BOK_API_KEY: ${{ secrets.BOK_API_KEY }}
        run: python scripts/backfill_history.py

      - name: Copy data to docs
        run: mkdir -p docs/data && cp data/* docs/data/

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "chore: backfill history data [skip ci]"
          git push
